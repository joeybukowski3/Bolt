<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon-bolt.svg?v=1">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5946778263750869" crossorigin="anonymous"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Decoder | Select by Category</title>
    <meta name="description" content="Choose a category and brand to open the correct decoder page.">
    <link rel="canonical" href="https://www.decodemyitem.com/universal-decoder.html">
    <link rel="stylesheet" href="global.css">
    
</head>
<body>
    <div class="circuit-bg"></div>
    <div class="page-shell" style="padding-left:0;padding-right:0;">
        <div class="app-container content-wrapper container">
            <div class="universal-wrap">
                <div class="universal-card">
                    <h1 class="universal-title">Universal Category Decoder</h1>
                    <p class="universal-sub">Select a brand within this category to jump to its dedicated decoder page.</p>
                    <div class="universal-grid">
                        <div class="form-group">
                            <div class="step-label">Category</div>
                            <select id="uCategory" class="form-select"></select>
                        </div>
                        <div class="form-group">
                            <div class="step-label">Brand</div>
                            <select id="uBrand" class="form-select"></select>
                        </div>
                        <div class="form-group">
                            <div class="step-label">Serial Number (optional)</div>
                            <input id="uSerial" class="form-input" type="text" placeholder="Carry serial to selected brand page">
                        </div>
                    </div>
                    <div class="universal-actions">
                        <button id="uGo" class="universal-btn" type="button">Open Brand Decoder</button>
                    </div>
                </div>
            </div>
            <div class="footer">
                <div class="footer-links">
                    <a href="/methodology">Methodology</a>
                    <span class="footer-sep">|</span>
                    <a href="/disclaimer">Disclaimer</a>
                    <span class="footer-sep">|</span>
                    <a href="/contact">Contact</a>
                    <span class="footer-sep">|</span>
                    <a href="/privacy-policy">Privacy Policy</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            var map = {
                hvac: [
                    { name: 'Goodman', slug: 'goodman' },
                    { name: 'Carrier', slug: 'carrier' },
                    { name: 'Rheem', slug: 'rheem' },
                    { name: 'Trane', slug: 'trane' }
                ],
                'water-heaters': [
                    { name: 'Rheem', slug: 'rheem' },
                    { name: 'Bradford White', slug: 'bradford_white' },
                    { name: 'A.O. Smith', slug: 'a_o_smith' },
                    { name: 'State', slug: 'state_industries' }
                ],
                appliances: [
                    { name: 'GE', slug: 'ge' },
                    { name: 'Whirlpool', slug: 'whirlpool' },
                    { name: 'Samsung', slug: 'samsung' },
                    { name: 'LG', slug: 'lg' },
                    { name: 'Bosch', slug: 'bosch' },
                    { name: 'Maytag', slug: 'maytag' },
                    { name: 'Frigidaire', slug: 'frigidaire' },
                    { name: 'Kenmore', slug: 'kenmore' }
                ],
                electronics: [
                    { name: 'Apple', slug: 'apple' },
                    { name: 'HP', slug: 'hp' },
                    { name: 'ASUS', slug: 'asus' },
                    { name: 'Google Pixel', slug: 'google-pixel' },
                    { name: 'Sony', slug: 'sony' },
                    { name: 'Vizio', slug: 'vizio' },
                    { name: 'Panasonic', slug: 'panasonic' }
                ]
            };

            var categorySel = document.getElementById('uCategory');
            var brandSel = document.getElementById('uBrand');
            var serialEl = document.getElementById('uSerial');
            var goBtn = document.getElementById('uGo');

            Object.keys(map).forEach(function(key) {
                var opt = document.createElement('option');
                opt.value = key;
                if (key === 'hvac') opt.textContent = 'HVAC';
                else if (key === 'water-heaters') opt.textContent = 'Water Heaters';
                else opt.textContent = key.charAt(0).toUpperCase() + key.slice(1);
                categorySel.appendChild(opt);
            });

            function fillBrands(cat) {
                brandSel.innerHTML = '';
                (map[cat] || []).forEach(function(item) {
                    var opt = document.createElement('option');
                    opt.value = item.slug;
                    opt.textContent = item.name;
                    brandSel.appendChild(opt);
                });
            }

            categorySel.addEventListener('change', function() {
                fillBrands(categorySel.value);
            });

            goBtn.addEventListener('click', function() {
                var slug = brandSel.value;
                if (!slug) return;
                var serial = (serialEl.value || '').trim();
                var target = '/' + slug;
                if (slug.indexOf('_') !== -1) {
                    target = '/universal-decoder?cat=' + encodeURIComponent(categorySel.value) + '&brand=' + encodeURIComponent(slug);
                    if (serial) target += '&serial=' + encodeURIComponent(serial);
                    window.location.href = target;
                    return;
                }
                if (serial) target += '?serial=' + encodeURIComponent(serial);
                window.location.href = target;
            });

            var params = new URLSearchParams(window.location.search || '');
            var startCat = params.get('cat');
            var startBrand = params.get('brand');
            var startSerial = params.get('serial');
            if (startCat && map[startCat]) categorySel.value = startCat;
            fillBrands(categorySel.value || 'appliances');
            if (startBrand) {
                for (var i = 0; i < brandSel.options.length; i++) {
                    if (brandSel.options[i].value === startBrand) {
                        brandSel.value = startBrand;
                        break;
                    }
                }
            }
            if (startSerial) serialEl.value = startSerial;
        })();
    </script>
</body>
</html>
